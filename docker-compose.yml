services:
  xiaoai-assistant:
    build: .
    container_name: xiaoai-assistant
    ports:
      - "8765:8765"    # Web + WebSocket
    volumes:
      # 配置文件挂载出来方便修改
      - ./config.yaml:/app/config.yaml:ro
      # 音频缓存
      - ./audio:/app/audio
      # Whisper 模型缓存（避免重复下载）
      - whisper-cache:/root/.cache/whisper
    environment:
      - CONFIG_PATH=/app/config.yaml
      - AUDIO_DIR=/app/audio
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    network_mode: "host"   # 使用 host 网络，方便 DLNA 发现音箱
    # 如果用 bridge 模式，DLNA 可能搜不到设备

volumes:
  whisper-cache: