<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小管家 - AI 语音助手</title>
    <style>
        /* ============================================
               主题: 深空蓝 + 霓虹光效
               ============================================ */
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #131838;
            --bg-card: #1a1f3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --success: #00e676;
            --error: #ff5252;
            --gradient: linear-gradient(135deg, #00d4ff, #7b2ff7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* --- 头部 --- */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        /* --- 对话记录 --- */
        .chat-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            height: 320px;
            overflow-y: auto;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .message .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user {
            align-items: flex-end;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #0f3460, #1a1a5e);
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-items: flex-start;
        }
        .message.ai .bubble {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-bottom-left-radius: 4px;
        }

        .message .time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
            padding: 0 4px;
        }

        /* --- 录音按钮 (大圆环) --- */
        .record-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .record-btn .icon {
            font-size: 32px;
            transition: all 0.3s ease;
        }

        .record-btn:hover {
            border-color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .record-btn.recording {
            border-color: var(--error);
            animation: pulse-ring 1.5s infinite;
            box-shadow: 0 0 30px rgba(255, 82, 82, 0.3);
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }

        .record-btn.recording .icon {
            color: var(--error);
        }

        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }

        .record-hint {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .record-hint .highlight {
            color: var(--accent);
        }

        /* --- 状态指示器 --- */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
            font-size: 14px;
            color: var(--text-secondary);
            min-height: 24px;
        }

        .status-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-bar .dot.active {
            background: var(--success);
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.5);
        }

        .status-bar .dot.error {
            background: var(--error);
        }

        .status-bar .dot.thinking {
            background: var(--accent);
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- 音箱信息 --- */
        .speaker-info {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .speaker-info .connected {
            color: var(--success);
        }

        /* --- 文字输入切换 --- */
        .text-toggle {
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .text-toggle:hover {
            color: var(--accent);
        }

        .text-input-area {
            display: none;
            width: 100%;
            gap: 8px;
        }
        .text-input-area.show {
            display: flex;
        }

        .text-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }
        .text-input-area input:focus {
            border-color: var(--accent);
        }

        .text-input-area button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: var(--gradient);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .text-input-area button:disabled {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">🎙️</div>
            <h1>小管家 AI 助手</h1>
            <p>对着手机说话，小爱音箱回答</p>
        </div>

        <!-- 对话区 -->
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="bubble">你好！我是小管家，按住按钮说话，我让小爱音箱回答你 🎵</div>
                <div class="time">现在</div>
            </div>
        </div>

        <!-- 状态 -->
        <div class="status-bar" id="statusBar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">就绪</span>
        </div>

        <!-- 音箱连接状态 -->
        <div class="speaker-info" id="speakerInfo">
            🔊 音箱: <span id="speakerName">正在检测...</span>
        </div>

        <!-- 录音区 -->
        <div class="record-area">
            <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
                <span class="icon">🎤</span>
            </button>
            <span class="record-hint">
                <span class="highlight">按住</span> 说话，松手发送
            </span>
        </div>

        <!-- 文字输入切换 -->
        <div style="display:flex;justify-content:center;margin-top:14px;">
            <button class="text-toggle" id="toggleText" onclick="toggleTextInput()">
                ✏️ 改用文字输入
            </button>
        </div>

        <!-- 文字输入区 -->
        <div class="text-input-area" id="textInputArea">
            <input id="textInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendText()" />
            <button id="sendBtn" onclick="sendText()">发送</button>
        </div>
    </div>

    <script>
        // ============================================
        // 状态变量
        // ============================================
        let ws = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let isProcessing = false;
        let useTextMode = false;

        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const chatBox = document.getElementById('chatBox');
        const speakerName = document.getElementById('speakerName');

        // ============================================
        // 初始化
        // ============================================
        async function init() {
            // 获取状态
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                speakerName.textContent = data.speaker || '未连接';
            } catch(e) {
                speakerName.textContent = '无法连接服务器';
            }

            // 连接 WebSocket
            connectWS();
        }

        function connectWS() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/voice`);

            ws.onopen = () => {
                setStatus('就绪', 'active');
                recordBtn.disabled = false;
            };

            ws.onclose = () => {
                setStatus('连接断开，重连中...', 'error');
                recordBtn.disabled = true;
                setTimeout(connectWS, 2000);
            };

            ws.onerror = () => {
                setStatus('连接错误', 'error');
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    // 音频数据 - 播放
                    playAudio(event.data);
                } else {
                    // JSON 消息
                    const data = JSON.parse(event.data);
                    handleWSMessage(data);
                }
            };
        }

        function handleWSMessage(data) {
            switch (data.type) {
                case 'status':
                    setStatus(data.message, 'thinking');
                    break;

                case 'asr_result':
                    addMessage(data.text, 'user');
                    break;

                case 'llm_reply':
                    addMessage(data.text, 'ai');
                    break;

                case 'error':
                    setStatus('❌ ' + data.message, 'error');
                    isProcessing = false;
                    break;

                case 'pong':
                    break;
            }
        }

        // ============================================
        // 录音功能
        // ============================================
        async function toggleRecord() {
            if (isProcessing) return;

            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                    }
                });

                // 使用 MediaRecorder 录制 WAV
                const options = {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm'
                };

                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    // 停止所有音轨
                    stream.getTracks().forEach(t => t.stop());

                    // 发送音频
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    sendAudio(blob);
                };

                mediaRecorder.start(100); // 每100ms收集一次数据
                isRecording = true;
                recordBtn.classList.add('recording');
                setStatus('🎤 录音中...', 'thinking');
                recordBtn.querySelector('.icon').textContent = '⏹️';

            } catch (e) {
                setStatus('❌ 无法访问麦克风: ' + e.message, 'error');
                isRecording = false;
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            recordBtn.classList.remove('recording');
            recordBtn.querySelector('.icon').textContent = '🎤';
            setStatus('⏳ 处理中...', 'thinking');
            isProcessing = true;
            recordBtn.disabled = true;
        }

        async function sendAudio(blob) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                setStatus('❌ 连接已断开', 'error');
                isProcessing = false;
                recordBtn.disabled = false;
                return;
            }

            // 发送 WAV 格式
            // 浏览器录音是 webm/opus，需要在前端转码或后端处理
            // 后端已经支持多种格式，直接发送原始 blob
            ws.send(blob);

            // 发送结束信号
            ws.send(JSON.stringify({ cmd: 'stop_record' }));
        }

        // ============================================
        // 文字输入
        // ============================================
        function toggleTextInput() {
            useTextMode = !useTextMode;
            const area = document.getElementById('textInputArea');
            const toggle = document.getElementById('toggleText');

            if (useTextMode) {
                area.classList.add('show');
                toggle.textContent = '🎤 改用语音输入';
                document.querySelector('.record-area').style.display = 'none';
            } else {
                area.classList.remove('show');
                toggle.textContent = '✏️ 改用文字输入';
                document.querySelector('.record-area').style.display = 'flex';
            }
        }

        async function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            addMessage(text, 'user');
            setStatus('🤔 小管家思考中...', 'thinking');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text})
                });
                const data = await res.json();
                if (data.reply) {
                    addMessage(data.reply, 'ai');
                    setStatus('🔊 已推送到音箱', 'active');
                } else {
                    setStatus('❌ ' + (data.error || '出错了'), 'error');
                }
            } catch(e) {
                setStatus('❌ 网络错误', 'error');
            }

            btn.disabled = false;
        }

        // ============================================
        // UI 辅助
        // ============================================
        function addMessage(text, cls) {
            const div = document.createElement('div');
            div.className = 'message ' + cls;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'time';
            time.textContent = new Date().toLocaleTimeString();

            div.appendChild(bubble);
            div.appendChild(time);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            isProcessing = false;
            recordBtn.disabled = false;
        }

        function setStatus(text, type) {
            statusText.textContent = text;
            statusDot.className = 'dot';
            if (type) statusDot.classList.add(type);
        }

        function playAudio(blob) {
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.onended = () => {
                URL.revokeObjectURL(url);
                setStatus('就绪', 'active');
                isProcessing = false;
                recordBtn.disabled = false;
            };
            audio.play().catch(e => {
                setStatus('❌ 播放失败', 'error');
                isProcessing = false;
                recordBtn.disabled = false;
            });
            setStatus('🔊 正在播放...', 'thinking');
        }

        // ============================================
        // 启动
        // ============================================
        init();
    </script>
</body>
</html>
