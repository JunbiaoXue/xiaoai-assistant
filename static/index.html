<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小管家 - AI 语音助手</title>
    <style>
        /* ============================================
           主题: 深空蓝 + 霓虹光效
           ============================================ */
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #131838;
            --bg-card: #1a1f3a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --success: #00e676;
            --warning: #ffc107;
            --error: #ff5252;
            --gradient: linear-gradient(135deg, #00d4ff, #7b2ff7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* --- 头部 --- */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        /* --- 对话记录 --- */
        .chat-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            height: 340px;
            overflow-y: auto;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

        .message { margin-bottom: 12px; display: flex; flex-direction: column; }

        .message .bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 15px;
            line-height: 1.55;
            word-break: break-word;
        }

        .message.user { align-items: flex-end; }
        .message.user .bubble {
            background: linear-gradient(135deg, #0f3460, #1a1a5e);
            border-bottom-right-radius: 4px;
        }

        .message.ai { align-items: flex-start; }
        .message.ai .bubble {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-bottom-left-radius: 4px;
        }

        .message.system { align-items: center; }
        .message.system .bubble {
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.15);
            color: var(--warning);
            font-size: 13px;
            text-align: center;
            max-width: 100%;
        }

        .message .time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 3px;
            padding: 0 4px;
        }

        /* --- 麦克风按钮 --- */
        .record-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .record-btn .icon {
            font-size: 34px;
            transition: all 0.3s ease;
        }

        .record-btn:hover {
            border-color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .record-btn.recording {
            border-color: var(--error);
            animation: pulse-ring 1.5s infinite;
            box-shadow: 0 0 30px rgba(255, 82, 82, 0.3);
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }

        .record-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: none;
        }

        .record-hint {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .record-hint .highlight { color: var(--accent); }

        /* --- 状态栏 --- */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
            font-size: 14px;
            color: var(--text-secondary);
            min-height: 24px;
        }

        .status-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            flex-shrink: 0;
        }
        .status-bar .dot.active { background: var(--success); box-shadow: 0 0 8px rgba(0,230,118,0.5); }
        .status-bar .dot.error { background: var(--error); }
        .status-bar .dot.thinking { background: var(--accent); animation: blink 0.8s infinite; }
        .status-bar .dot.speaking { background: var(--warning); animation: blink 0.5s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- 文本提示 --- */
        .speaker-info {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            min-height: 20px;
        }
        .speaker-info .connected { color: var(--success); }

        /* --- 文字输入切换 --- */
        .text-toggle {
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .text-toggle:hover { color: var(--accent); }

        .text-input-area {
            display: none;
            width: 100%;
            gap: 8px;
        }
        .text-input-area.show { display: flex; }

        .text-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }
        .text-input-area input:focus { border-color: var(--accent); }

        .text-input-area button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: var(--gradient);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .text-input-area button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">🎙️</div>
            <h1>小管家 AI 助手</h1>
            <p id="subtitle">按住说话，小爱音箱回答</p>
        </div>

        <!-- 对话区 -->
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="bubble">你好！我是小管家，按住 🎤 按钮说话，或者点下方「改用文字输入」和我聊天 😊</div>
                <div class="time">现在</div>
            </div>
        </div>

        <!-- 状态 -->
        <div class="status-bar" id="statusBar">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">就绪</span>
        </div>

        <!-- 音箱连接状态 -->
        <div class="speaker-info" id="speakerInfo">🔊 音箱: <span id="speakerName">检测中...</span></div>

        <!-- 录音区 -->
        <div class="record-area">
            <button class="record-btn" id="recordBtn">
                <span class="icon">🎤</span>
            </button>
            <span class="record-hint" id="recordHint">
                <span class="highlight">点击</span> 开始说话，再点停止
            </span>
        </div>

        <!-- 文字输入切换 -->
        <div style="display:flex;justify-content:center;margin-top:14px;">
            <button class="text-toggle" id="toggleText">✏️ 改用文字输入</button>
        </div>

        <!-- 文字输入区 -->
        <div class="text-input-area" id="textInputArea">
            <input id="textInput" placeholder="输入消息..." />
            <button id="sendBtn" disabled>发送</button>
        </div>
    </div>

    <script>
        // ============================================
        // Web Speech API 语音识别 (浏览器内置，不需要服务器音频处理)
        // ============================================

        // 状态变量
        let isListening = false;
        let isProcessing = false;
        let recognition = null;
        let useTextMode = false;
        let speakerNameEl = document.getElementById('speakerName');

        const recordBtn = document.getElementById('recordBtn');
        const recordHint = document.getElementById('recordHint');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const chatBox = document.getElementById('chatBox');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const toggleBtn = document.getElementById('toggleText');
        const textArea = document.getElementById('textInputArea');

        // ============================================
        // 初始化
        // ============================================
        async function init() {
            // 获取音箱状态
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                speakerNameEl.textContent = data.speaker || '未连接';
            } catch (e) {
                speakerNameEl.textContent = '无法连接服务器';
            }

            // 检测浏览器是否支持语音识别
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                setupRecognition();
                recordBtn.disabled = false;
            } else {
                setStatus('❌ 浏览器不支持语音识别', 'error');
                recordBtn.disabled = true;
                document.querySelector('.record-area').style.display = 'none';
                toggleTextInput(); // 自动切到文字模式
            }

            // 输入框 Enter 发送
            textInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !sendBtn.disabled) sendText();
            });

            // 输入框内容变化控制发送按钮
            textInput.addEventListener('input', function() {
                sendBtn.disabled = !this.value.trim();
            });

            // 事件绑定
            toggleBtn.addEventListener('click', toggleTextInput);
            sendBtn.addEventListener('click', sendText);
            recordBtn.addEventListener('click', toggleRecord);
            recordBtn.addEventListener('touchstart', function(e) {
                // 防止 iOS 双击缩放
                e.preventDefault();
            }, { passive: true });
        }

        // ============================================
        // Web Speech API 设置
        // ============================================
        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();

            // 配置
            recognition.lang = 'zh-CN';
            recognition.continuous = false;     // 单次识别
            recognition.interimResults = true;  // 中间结果
            recognition.maxAlternatives = 1;

            // 识别结果
            recognition.onresult = function(event) {
                let interimText = '';
                let finalText = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalText += transcript;
                        // 显示用户说了什么
                        addMessage(transcript, 'user');
                    } else {
                        interimText += transcript;
                    }
                }

                // 实时显示中间结果
                if (interimText) {
                    statusText.textContent = '🎤 ' + interimText;
                }
            };

            // 识别结束
            recognition.onend = function() {
                isListening = false;
                recordBtn.classList.remove('recording');
                recordBtn.querySelector('.icon').textContent = '🎤';
                recordHint.innerHTML = '<span class="highlight">点击</span> 开始说话，再点停止';

                // 如果还在处理中，不要重复触发
                if (!isProcessing) {
                    setStatus('就绪', 'active');
                }
            };

            // 识别错误
            recognition.onerror = function(event) {
                isListening = false;
                recordBtn.classList.remove('recording');
                recordBtn.querySelector('.icon').textContent = '🎤';
                recordHint.innerHTML = '<span class="highlight">点击</span> 开始说话，再点停止';

                switch (event.error) {
                    case 'no-speech':
                        setStatus('没听到声音，再试一次', 'error');
                        break;
                    case 'audio-capture':
                        setStatus('❌ 无法访问麦克风', 'error');
                        document.querySelector('.subtitle').textContent = '请允许麦克风权限';
                        break;
                    case 'not-allowed':
                        setStatus('❌ 麦克风被拒绝', 'error');
                        document.querySelector('.subtitle').textContent = '请在浏览器设置中允许麦克风';
                        break;
                    case 'network':
                        setStatus('❌ 网络错误', 'error');
                        break;
                    default:
                        setStatus('❌ 语音识别: ' + event.error, 'error');
                }
            };

            // 识别到结果后自动发送到服务器
            recognition.onresult = function(event) {
                let finalText = '';
                let hasFinal = false;

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalText += transcript;
                        hasFinal = true;
                    } else {
                        // 显示中间识别结果
                        statusText.textContent = '🎤 ' + transcript;
                    }
                }

                if (hasFinal && finalText.trim()) {
                    // 显示用户说的话
                    addMessage(finalText.trim(), 'user');
                    // 停止识别
                    stopListening();
                    // 发送到服务器
                    processText(finalText.trim());
                }
            };
        }

        // ============================================
        // 录音控制
        // ============================================
        function toggleRecord() {
            if (isProcessing) return;

            if (!isListening) {
                startListening();
            } else {
                stopListening();
            }
        }

        function startListening() {
            if (!recognition) {
                setStatus('❌ 不支持语音识别', 'error');
                return;
            }

            try {
                // 重置识别器（防止重复启动）
                try { recognition.abort(); } catch(e) {}

                isListening = true;
                recordBtn.classList.add('recording');
                recordBtn.querySelector('.icon').textContent = '🎤';
                recordHint.innerHTML = '<span class="highlight">点击</span> 停止';
                setStatus('🎤 请说话...', 'thinking');

                recognition.start();
            } catch (e) {
                setStatus('❌ 启动失败: ' + e.message, 'error');
                isListening = false;
                recordBtn.classList.remove('recording');
                recordBtn.querySelector('.icon').textContent = '🎤';
                recordHint.innerHTML = '<span class="highlight">点击</span> 开始说话';
            }
        }

        function stopListening() {
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            isListening = false;
            recordBtn.classList.remove('recording');
            recordBtn.querySelector('.icon').textContent = '🎤';
            recordHint.innerHTML = '<span class="highlight">点击</span> 开始说话，再点停止';
        }

        // ============================================
        // 发送文字到服务器
        // ============================================
        async function processText(text) {
            if (!text.trim()) return;

            isProcessing = true;
            recordBtn.disabled = true;
            setStatus('🤔 小管家思考中...', 'thinking');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text.trim() })
                });
                const data = await res.json();

                if (data.reply) {
                    addMessage(data.reply, 'ai');
                    if (data.pushed_to_speaker) {
                        setStatus('🔊 小爱音箱播报中...', 'speaking');
                    } else {
                        setStatus('✅ 回复完成', 'active');
                    }
                } else {
                    setStatus('❌ ' + (data.error || '出错了'), 'error');
                }
            } catch (e) {
                setStatus('❌ 网络错误: ' + e.message, 'error');
            }

            isProcessing = false;
            recordBtn.disabled = false;
        }

        function sendText() {
            const text = textInput.value.trim();
            if (!text || sendBtn.disabled) return;

            textInput.value = '';
            sendBtn.disabled = true;
            addMessage(text, 'user');
            processText(text);
        }

        // ============================================
        // 文字/语音切换
        // ============================================
        function toggleTextInput() {
            useTextMode = !useTextMode;

            if (useTextMode) {
                textArea.classList.add('show');
                toggleBtn.textContent = '🎤 改用语音输入';
                document.querySelector('.record-area').style.display = 'none';
                textInput.focus();
            } else {
                textArea.classList.remove('show');
                toggleBtn.textContent = '✏️ 改用文字输入';
                document.querySelector('.record-area').style.display = 'flex';
            }
        }

        // ============================================
        // UI 辅助函数
        // ============================================
        function addMessage(text, cls) {
            const div = document.createElement('div');
            div.className = 'message ' + cls;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'time';
            time.textContent = new Date().toLocaleTimeString();

            div.appendChild(bubble);
            div.appendChild(time);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setStatus(text, type) {
            statusText.textContent = text;
            statusDot.className = 'dot';
            if (type) statusDot.classList.add(type);
        }

        // ============================================
        // 启动
        // ============================================
        init();
    </script>
</body>
</html>
